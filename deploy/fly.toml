app = "telepace-api"
primary_region = "sea"

[build]
  dockerfile = "deploy/Dockerfile.api"

[env]
  TELEPACE_PUBLIC_BASE_URL = "https://app.telepace.io"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    timeout = "5s"
    method = "get"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-2x"
  memory_mb = 1024
