services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: telepace
      POSTGRES_PASSWORD: ${TELEPACE_POSTGRES_PASSWORD:?set TELEPACE_POSTGRES_PASSWORD}
      POSTGRES_DB: telepace
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telepace"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: ../.env
    environment:
      TELEPACE_DATABASE_URL: postgresql://telepace:${TELEPACE_POSTGRES_PASSWORD:?set TELEPACE_POSTGRES_PASSWORD}@postgres:5432/telepace
      TELEPACE_REDIS_URL: redis://redis:6379/0
      TELEPACE_PUBLIC_BASE_URL: https://telepace.cubxxw.com
      TELEPACE_API_BASE_URL: https://api.telepace.cubxxw.com
      TELEPACE_CORS_ALLOW_ORIGINS: '["https://telepace.cubxxw.com"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:18010:8000"
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: ../.env
    environment:
      TELEPACE_DATABASE_URL: postgresql://telepace:${TELEPACE_POSTGRES_PASSWORD:?set TELEPACE_POSTGRES_PASSWORD}@postgres:5432/telepace
      TELEPACE_REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "interfaces.rest_api.worker"]
    depends_on:
      - api
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    restart: unless-stopped
    env_file: ../.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://api.telepace.cubxxw.com
    depends_on:
      - api
    ports:
      - "127.0.0.1:13300:3300"
volumes:
  pg_data:
  redis_data:
