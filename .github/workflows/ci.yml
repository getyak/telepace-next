name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: telepace
          POSTGRES_PASSWORD: telepace
          POSTGRES_DB: telepace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U telepace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install deps
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy core harness agents storage interfaces || true
      - name: Test
        env:
          TELEPACE_DATABASE_URL: postgresql://telepace:telepace@localhost:5432/telepace
          TELEPACE_REDIS_URL: redis://localhost:6379/0
        run: uv run pytest -q || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/design-guard.sh
      - run: pnpm typecheck
      - run: pnpm check:tokens
      - run: pnpm test
      - run: pnpm build
